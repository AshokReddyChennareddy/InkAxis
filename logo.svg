  <!-- Data dots -->
  <circle cx="18" cy="24" r="2.5" fill="#4AACDB"/>
  <circle cx="36" cy="16" r="2.5" fill="#4AACDB"/>

  <!-- Wordmark: Ink -->
  <text x="56" y="32" font-family="Georgia, 'Cormorant Garamond', serif" font-size="22" font-weight="700" fill="#0D0D0D" letter-spacing="-0.5">Ink</text>
  <!-- Wordmark: Axis (sky blue) -->
  <text x="84" y="32" font-family="Georgia, 'Cormorant Garamond', serif" font-size="22" font-weight="700" fill="#4AACDB" letter-spacing="-0.5">Axis</text>
</svg>