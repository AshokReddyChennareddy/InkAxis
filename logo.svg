  <line x1="8" y1="40" x2="8" y2="6" stroke="#4AACDB" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Chart line (pen/data line) -->
  <polyline points="10,34 18,24 26,28 36,16 44,10" stroke="#2AADAD" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
